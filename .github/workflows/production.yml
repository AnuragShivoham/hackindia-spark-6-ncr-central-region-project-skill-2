name: Production Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Backend
        run: |
          cd backend
          npm ci

      - name: Install Frontend
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Run Tests
        run: |
          echo "Add real tests or stop pretending"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Backend (Render)
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
